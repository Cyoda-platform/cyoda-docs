<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-labelledby="esmTitle esmDesc" font-family="Inter, system-ui, sans-serif">
  <title id="esmTitle">Example entity state machine</title>
  <desc id="esmDesc">Four states (new, active, approved, archived) connected by auto and manual transitions. Transitions carry processors (green pills) and criteria (purple diamonds). A loopback from archived to active illustrates that entity workflows are not linear and need not terminate.</desc>

  <defs>
    <marker id="arrTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4FB8B0"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#FD9E29"/>
    </marker>
  </defs>

  <!-- States -->
  <g font-size="14" text-anchor="middle" fill="currentColor">
    <rect x="20"  y="140" width="110" height="50" rx="8" fill="none" stroke="#4FB8B0" stroke-width="2"/>
    <text x="75"  y="172">new</text>
    <rect x="200" y="140" width="110" height="50" rx="8" fill="none" stroke="#4FB8B0" stroke-width="2"/>
    <text x="255" y="172">active</text>
    <rect x="380" y="140" width="110" height="50" rx="8" fill="none" stroke="#4FB8B0" stroke-width="2"/>
    <text x="435" y="172">approved</text>
    <rect x="560" y="140" width="110" height="50" rx="8" fill="none" stroke="#4FB8B0" stroke-width="2"/>
    <text x="615" y="172">archived</text>
  </g>

  <!-- new -> active: auto, processor -->
  <line x1="130" y1="165" x2="200" y2="165" stroke="#4FB8B0" stroke-width="2" marker-end="url(#arrTeal)"/>
  <rect x="134" y="125" width="62" height="22" rx="11" fill="#6BB45A"/>
  <text x="165" y="140" font-size="11" fill="#fff" text-anchor="middle">validate</text>
  <text x="165" y="205" font-size="10" fill="#4FB8B0" text-anchor="middle">auto</text>

  <!-- active -> approved: manual, processor -->
  <line x1="310" y1="165" x2="380" y2="165" stroke="#FD9E29" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrOrange)"/>
  <rect x="318" y="125" width="54" height="22" rx="11" fill="#6BB45A"/>
  <text x="345" y="140" font-size="11" fill="#fff" text-anchor="middle">notify</text>
  <text x="345" y="205" font-size="10" fill="#FD9E29" text-anchor="middle">manual</text>

  <!-- approved -> archived: auto, criterion -->
  <line x1="490" y1="165" x2="560" y2="165" stroke="#4FB8B0" stroke-width="2" marker-end="url(#arrTeal)"/>
  <polygon points="525,128 551,150 525,172 499,150" fill="#5A18AC"/>
  <text x="525" y="153" font-size="10" fill="#fff" text-anchor="middle">age&gt;30d</text>
  <text x="525" y="205" font-size="10" fill="#4FB8B0" text-anchor="middle">auto</text>

  <!-- Loopback: archived -> active (manual) -->
  <path d="M 615 140 C 615 50, 255 50, 255 140" fill="none" stroke="#FD9E29" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrOrange)"/>
  <text x="435" y="55" font-size="11" fill="#FD9E29" text-anchor="middle">reactivate (manual)</text>

  <!-- Legend -->
  <g font-size="11" fill="currentColor" transform="translate(20, 260)">
    <line x1="0" y1="8" x2="28" y2="8" stroke="#4FB8B0" stroke-width="2"/>
    <text x="34" y="12">auto transition</text>
    <line x1="150" y1="8" x2="178" y2="8" stroke="#FD9E29" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="184" y="12">manual transition</text>
    <rect x="315" y="0" width="56" height="16" rx="8" fill="#6BB45A"/>
    <text x="343" y="12" fill="#fff" text-anchor="middle">processor</text>
    <polygon points="395,8 410,0 425,8 410,16" fill="#5A18AC"/>
    <text x="432" y="12">criterion</text>
  </g>
</svg>
