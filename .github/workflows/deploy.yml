# Build, test, and deploy the site to GitHub Pages.
# Runs only on push to main and manual dispatch — PR checks live in ci.yml.
name: Deploy Astro site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --omit=dev
      - name: Install Playwright browsers for Mermaid rendering and testing
        run: npx playwright install --with-deps chromium
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: false
          CI: true
      - name: Build site
        run: npm run build
        env:
          NODE_ENV: production
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          CI: true
      - name: Install serve for testing
        run: npm install -g serve
      - name: Run node:test + Playwright (GDPR, GA, navigators, build integration)
        run: npm test
        env:
          NODE_ENV: production
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          CI: true
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5